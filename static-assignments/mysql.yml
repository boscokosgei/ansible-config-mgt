---
- hosts: db
  become: yes

  vars:
    mysql_root_password: rootpassword

    mysql_databases:
      - name: tooling
        encoding: utf8
        collation: utf8_general_ci

    mysql_users:
      - name: tooling
        host: "%"
        password: toolingpass
        priv: "tooling.*:ALL"
  
  roles:
    - geerlingguy.mysql

